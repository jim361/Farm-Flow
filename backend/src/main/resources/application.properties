spring.application.name=backend

# PostgreSQL 연결 설정
spring.datasource.url=jdbc:postgresql://localhost:5432/farmflow
spring.datasource.username=farmflow
spring.datasource.password=farmflow1234

# JPA/Hibernate 설정 (500 에러 방지의 핵심)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# [중요] 자바의 camelCase를 DB의 snake_case로 자동 변환해주는 설정
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy